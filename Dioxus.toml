[application]
name             = "vaelvet"
default_platform = "web"
out_dir          = "dist"

[web.app]
title     = "Vaelvet — elevate your Presence"
base_path = "/"

[web.watcher]
reload_html = true
watch       = ["assets", "src", "../content"]

[web.resource]
# All resources are loaded via Rust-side asset!() + document::Link so dx hashes
# them. Leaving these arrays empty prevents duplicate un-hashed <link> tags.
style  = []
script = []

[web.resource.dev]
style  = []
script = []

[bundle]
icon              = ["assets/images/favicon.png"]
copyright         = "Vaelvet"
category          = "Business"
short_description = "Cinematic PR house. We compose entrances."
long_description  = "Vaelvet is a premium public-relations house for film, music, fashion, and founders. Every campaign is staged like a third-act reveal."
