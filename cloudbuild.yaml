steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - --target
      - runtime
      - -f
      - Containerfile
      - --cache-from
      - us-central1-docker.pkg.dev/theionixinference/velvet/velvet-web:latest
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - -t
      - us-central1-docker.pkg.dev/theionixinference/velvet/velvet-web:v2
      - -t
      - us-central1-docker.pkg.dev/theionixinference/velvet/velvet-web:latest
      - .

images:
  - us-central1-docker.pkg.dev/theionixinference/velvet/velvet-web:v2
  - us-central1-docker.pkg.dev/theionixinference/velvet/velvet-web:latest

options:
  machineType: E2_HIGHCPU_8
timeout: 2400s
